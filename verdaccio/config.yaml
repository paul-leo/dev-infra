storage: /verdaccio/storage
auth:
  htpasswd:
    file: /verdaccio/storage/htpasswd
    max_users: 1   # Only 1 admin user allowed, no self-registration after that

uplinks:
  npmjs:
    url: https://registry.npmjs.org/
    timeout: 30s

packages:
  # @dev-infra/* private packages: authenticated access only
  "@dev-infra/*":
    access: $authenticated
    publish: $authenticated
    storage: "@dev-infra"

  # @harness-fe/* packages: cache from npmjs, authenticated publish
  "@harness-fe/*":
    access: $all
    publish: $authenticated
    proxy: npmjs
    storage: "@harness-fe"

  # Public packages: anonymous read, authenticated publish, proxy to npmjs
  "**":
    access: $all
    publish: $authenticated
    proxy: npmjs

log: { type: stdout, format: pretty, level: warn }
web:
  enable: true
  title: dev-infra npm registry
listen: "0.0.0.0:${PORT:-4873}"
