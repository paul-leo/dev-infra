name: ${COMPOSE_PROJECT_NAME:-dev-infra}

services:
  gitlab:
    image: ${GITLAB_IMAGE:-gitlab/gitlab-ce:17.11.1-ce.0}
    restart: unless-stopped
    hostname: "${GITLAB_HOSTNAME:-localhost}"
    env_file: .env
    shm_size: "256m"
    ports:
      - "${HOST_IP:-127.0.0.1}:${GITLAB_PORT:-8080}:80"
      - "${HOST_IP:-127.0.0.1}:${GITLAB_SSH_PORT:-9022}:22"
    environment:
      GITLAB_ROOT_PASSWORD: "${GITLAB_ROOT_PASSWORD}"
      GITLAB_OMNIBUS_CONFIG: |
        external_url '${GITLAB_EXTERNAL_URL:-http://localhost:8080}'
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_PORT:-9022}
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        letsencrypt['enable'] = false
        gitlab_rails['gitlab_default_projects_features_visibility_level'] = 'private'
        gitlab_rails['gitlab_username_changing_enabled'] = false
        gitlab_rails['signup_enabled'] = false
        gitlab_rails['usage_ping_enabled'] = false
        gitlab_rails['packages_enabled'] = true
        registry['enable'] = false
    volumes:
      - ./data/gitlab/config:/etc/gitlab
      - ./data/gitlab/logs:/var/log/gitlab
      - ./data/gitlab/data:/var/opt/gitlab

  gitlab-runner:
    image: ${GITLAB_RUNNER_IMAGE:-gitlab/gitlab-runner:v17.11.1}
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/gitlab-runner/config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - gitlab

  verdaccio:
    image: verdaccio/verdaccio:5
    restart: unless-stopped
    ports:
      - "${HOST_IP:-127.0.0.1}:${VERDACCIO_PORT:-4873}:4873"
    volumes:
      - ./data/verdaccio/storage:/verdaccio/storage
      - ./verdaccio/config.yaml:/verdaccio/conf/config.yaml:ro

  bit:
    image: ${BIT_IMAGE:-bitcli/bit-server:1.13.58-node-22.22.0}
    platform: linux/amd64
    restart: unless-stopped
    env_file: .env
    working_dir: /root/${BIT_SCOPE_NAME:-dev-infra}
    command: ["/bin/sh", "/scripts/start-bit-scope.sh"]
    environment:
      BIT_SCOPE_NAME: "${BIT_SCOPE_NAME:-dev-infra}"
    ports:
      - "${HOST_IP:-127.0.0.1}:${BIT_PORT:-3000}:3000"
    volumes:
      - ./scripts/start-bit-scope.sh:/scripts/start-bit-scope.sh:ro
      - ./data/bit/scope:/root/${BIT_SCOPE_NAME:-dev-infra}
      - ./data/bit/logs:/root/Library/Caches/Bit/logs
