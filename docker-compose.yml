name: dev-infra

services:
  caddy:
    image: caddy:2.8
    restart: unless-stopped
    env_file: .env
    ports:
      - "${HOST_IP}:80:80"
      - "${HOST_IP}:443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy/certs:/etc/caddy/certs:ro
      - ./data/caddy/data:/data
      - ./data/caddy/config:/config
    depends_on:
      - gitlab
      - verdaccio

  gitlab:
    image: gitlab/gitlab-ce:17.11.1-ce.0
    restart: unless-stopped
    hostname: "${GITLAB_HOST}"
    env_file: .env
    shm_size: "256m"
    ports:
      - "${HOST_IP}:${GITLAB_SSH_PORT}:22"
    environment:
      GITLAB_ROOT_PASSWORD: "${GITLAB_ROOT_PASSWORD}"
      GITLAB_OMNIBUS_CONFIG: |
        external_url 'https://${GITLAB_HOST}'
        gitlab_rails['gitlab_shell_ssh_port'] = ${GITLAB_SSH_PORT}
        nginx['listen_port'] = 80
        nginx['listen_https'] = false
        letsencrypt['enable'] = false
        gitlab_rails['gitlab_default_projects_features_visibility_level'] = 'private'
        gitlab_rails['gitlab_username_changing_enabled'] = false
        gitlab_rails['signup_enabled'] = false
        gitlab_rails['usage_ping_enabled'] = false
        gitlab_rails['packages_enabled'] = true
        registry['enable'] = false
    volumes:
      - ./data/gitlab/config:/etc/gitlab
      - ./data/gitlab/logs:/var/log/gitlab
      - ./data/gitlab/data:/var/opt/gitlab

  verdaccio:
    image: verdaccio/verdaccio:5
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./verdaccio/config.yaml:/verdaccio/conf/config.yaml:ro
      - ./data/verdaccio/storage:/verdaccio/storage
      - ./data/verdaccio/plugins:/verdaccio/plugins

